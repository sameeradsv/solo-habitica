<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solo Habitica</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;padding:20px}h1{color:#16c79a;margin-bottom:20px}.task-form{background:#16213e;padding:20px;border-radius:8px;margin-bottom:20px}.task-form input,.task-form select{width:100%;padding:10px;margin:5px 0;border-radius:4px;border:none}.task-form button{background:#16c79a;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin-top:10px}.tasks{display:grid;gap:10px}.task{background:#16213e;padding:15px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}.task.easy{border-left:4px solid #4CAF50}.task.medium{border-left:4px solid #FF9800}.task.hard{border-left:4px solid #F44336}.task-info h3{color:#16c79a}.task-info p{color:#aaa;font-size:14px}.task-actions button{margin-left:5px;padding:8px 15px;border:none;border-radius:4px;cursor:pointer}.complete{background:#4CAF50;color:#fff}.delete{background:#F44336;color:#fff}.stats{background:#16213e;padding:20px;border-radius:8px;margin-bottom:20px}.stats h2{color:#16c79a;margin-bottom:10px}.stats p{margin:5px 0}</style></head><body><h1>Solo Habitica</h1><div class="stats"><h2>Your Progress</h2><p>XP: <span id="xp">0</span></p><p>Level: <span id="level">1</span></p><p>Gold: <span id="gold">0</span></p></div><div class="task-form"><h2>Add New Task</h2><input type="text" id="taskName" placeholder="Task Name"><select id="taskDifficulty"><option value="easy">Easy (+10 XP, +5 Gold)</option><option value="medium">Medium (+20 XP, +10 Gold)</option><option value="hard">Hard (+40 XP, +20 Gold)</option></select><button onclick="addTask()">Add Task</button></div><div class="tasks" id="taskList"></div><script>let data={xp:0,level:1,gold:0,tasks:[]};function loadData(){const saved=localStorage.getItem('soloHabitica');if(saved){data=JSON.parse(saved);updateStats();renderTasks()}}function saveData(){localStorage.setItem('soloHabitica',JSON.stringify(data))}function updateStats(){document.getElementById('xp').textContent=data.xp;document.getElementById('level').textContent=data.level;document.getElementById('gold').textContent=data.gold;if(data.xp>=100*data.level){data.level++;data.xp=0;alert('Level Up! You are now level '+data.level);saveData();updateStats()}}function addTask(){const name=document.getElementById('taskName').value;const difficulty=document.getElementById('taskDifficulty').value;if(!name)return;data.tasks.push({id:Date.now(),name,difficulty});document.getElementById('taskName').value='';saveData();renderTasks()}function completeTask(id){const task=data.tasks.find(t=>t.id===id);if(!task)return;const rewards={easy:{xp:10,gold:5},medium:{xp:20,gold:10},hard:{xp:40,gold:20}};data.xp+=rewards[task.difficulty].xp;data.gold+=rewards[task.difficulty].gold;data.tasks=data.tasks.filter(t=>t.id!==id);saveData();updateStats();renderTasks()}function deleteTask(id){data.tasks=data.tasks.filter(t=>t.id!==id);saveData();renderTasks()}function renderTasks(){const list=document.getElementById('taskList');list.innerHTML='';data.tasks.forEach(task=>{const div=document.createElement('div');div.className='task '+task.difficulty;div.innerHTML=`<div class="task-info"><h3>${task.name}</h3><p>Difficulty: ${task.difficulty.toUpperCase()}</p></div><div class="task-actions"><button class="complete" onclick="completeTask(${task.id})">Complete</button><button class="delete" onclick="deleteTask(${task.id})">Delete</button></div>`;list.appendChild(div)})}loadData()</script></body></html>
